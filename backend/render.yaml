services:
  - type: web
    name: nexttalent-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nexttalent-db
          property: connectionString

databases:
  - name: nexttalent-db
    databaseName: nexttalent
    user: nexttalent
